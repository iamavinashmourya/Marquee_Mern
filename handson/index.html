<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slug Studio</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div class="page">

        <nav>
            <div class="nav-logo">Generator</div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Pages <span class="chevron">▾</span></a></li>
                    <li><a href="#">Blog Templates <span class="chevron">▾</span></a></li>
                </ul>
            </div>
            <button class="nav-btn">Install Theme</button>

        </nav>


        <section class="hero">
            <p class="hero-eyebrow">Home Page</p>
            <h1 class="hero-headline">Build and manage your HubSpot website without code.</h1>
            <p class="hero-sub">This HubSpot website theme provides marketers with the tools they need to build modern
                websites, landing pages and blog on HubSpot without a developer.</p>
            <button class="hero-cta">Learn more</button>
        </section>


        <div class="logos-section">
            <img src="https://placehold.co/120x40?text=Netflix"
                class="logo-item" alt="Netflix"></img>
            <img src="https://placehold.co/120x40?text=Lacoste%22"
                class="logo-item" alt="Lacoste"></img>
            <img src="https://placehold.co/160x40?text=Juniper+Networks"
                class="logo-item" alt="junper"></img>
            <img src="https://placehold.co/120x40?text=HubSpot%22" alt="HubSpot"></img>
        </div>
    </div>
</body>

</html>
