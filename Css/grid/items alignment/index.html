<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Items-Alignment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: gilroy, sans-serif;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            grid-template-rows: repeat(3, 100px);
            /* What is the Difference Btweeen Cells and Items */
            /* grid-row and grid-col */
            /* grid-template-areas:; */
        }

        /* Different Color to each Items  */
        #item-1 {
            background: red;

            grid-column: span 2;
            grid-row: span 3;
        }

        #item-2 {
            background: blue;

            grid-column: span 3;
        }

        #item-3 {
            background: yellow;
            color: black;

            grid-column: span 3;
        }

        #item-4 {
            background: green;

            grid-column: span 3;
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="items" id="item-1"></div>
        <div class="items" id="item-2"></div>
        <div class="items" id="item-3"></div>
        <div class="items" id="item-4"></div>
    </div>
</body>

</html>
