<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header-top-nav">
        <div class="header-top-nav-btn">
          <a href="#" class="btn-flipkart">
            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=60"
              alt="Flipkart Icon"
              class="img-icon"
            />

            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=60"
              alt="Flipkart Logo"
              class="img-logo"
            />
          </a>

          <a href="#" class="btn-travel">
            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=60"
              alt="Travel Icon"
              class="img-icon"
            />

            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=60"
              alt="Travel Logo"
              class="img-logo"
            />
          </a>

          <a href="#" class="btn-grocery">
            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/72/44/image/94da0a9723503a85.png?q=60"
              alt="Grocery Icon"
              class="img-icon-grocery"
            />

            <img
              src="https://rukminim2.flixcart.com/fk-p-flap/96/36/image/7713c8cc7e74127c.png?q=60"
              alt="Grocery Logo"
              class="img-logo"
            />
          </a>

          <div class="location-box">
            <i class="fa-solid fa-location-dot"></i>

            <span class="location-text">
              Tarsali, Near St.Mary's High School, Vadodara, ...
            </span>

            <i class="fa-solid fa-angle-right"></i>
          </div>
        </div>
      </div>

      <div class="header-middle-nav">
        <div class="search-box">
          <i class="fa-brands fa-sistrix"></i>
          <input
            type="text"
            name=""
            id=""
            placeholder="Search for Products, Brands and More"
          />
        </div>

        <div class="header-middle-right">
          <a href="#" class="nav-item">
            <i class="fa-regular fa-circle-user"></i>
            <span>Login</span>
          </a>

          <a href="#" class="nav-item">
            <span>More</span>
            <i class="fa-solid fa-angle-down"></i>
          </a>

          <a href="#" class="nav-item">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>Cart</span>
          </a>
        </div>
      </div>

      <div class="header-bottom-nav">
        <div class="divider"></div>
        <div class="category-nav">
          <a href="#" class="category-item active">
            <img src="images/all.svg" alt="" />
            <span>For You</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/fashion.svg" alt="" />
            <span>Fashion</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/mobiles.svg" alt="" />
            <span>Mobiles</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/electronics.svg" alt="" />
            <span>Electronics</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/beauty.svg" alt="" />
            <span>Beauty</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/home-final.svg" alt="" />
            <span>Home</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/tv.svg" alt="" />
            <span>Appliances</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/toy.svg" alt="" />
            <span>Toys, baby</span>
          </a>

          <a href="#" class="category-item">
            <img src="images/food.svg" alt="" />
            <span>Food & Health</span>
          </a>
          <a href="#" class="category-item">
            <img src="images/auto-acc.svg" alt="" />
            <span>Auto Accessories</span>
          </a>
          <a href="#" class="category-item">
            <img src="images/sport.svg" alt="" />
            <span>Sports & Fitness</span>
          </a>
          <a href="#" class="category-item">
            <img src="images/furniture.svg" alt="" />
            <span>Furniture</span>
          </a>
          <a href="#" class="category-item">
            <img src="images/books.svg" alt="" />
            <span>Books & Media</span>
          </a>
          <a href="#" class="category-item">
            <img src="images/auto-new.svg" alt="" />
            <span>2 Wheelers</span>
          </a>

        </div>
        <div class="divider"></div>
      </div>
    </header>
  </body>
</html>
