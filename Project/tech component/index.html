<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <h2 class="sidebar-title">Technologies</h2>
        <nav class="sidebar-nav">
          <ul>
            <li class="nav-item active">
              <span class="nav-icon">🖥️</span>
              <span class="nav-label">Frontend</span>
            </li>
            <li class="nav-item">
              <span class="nav-icon">☰</span>
              <span class="nav-label">Backend</span>
            </li>
            <li class="nav-item">
              <span class="nav-icon">📱</span>
              <span class="nav-label">Mobile</span>
            </li>
            <li class="nav-item">
              <span class="nav-icon">🗂️</span>
              <span class="nav-label">Platforms</span>
            </li>
            <li class="nav-item">
              <span class="nav-icon">🗄️</span>
              <span class="nav-label">Databases</span>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <div class="content-header">
          <span class="header-icon"><i class="fa-solid fa-desktop" style="color: rgb(255, 255, 255);"></i></i></span>
          <h1 class=".header-title">Frontend</h1>
        </div>

        <div class="tech-grid">
          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/Angular.svg" alt="AngularJS" class="tech-icon" />
            </div>
            <p class="tech-name">AngularJS</p>
          </div>

          
          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/React.svg" alt="ReactJS" class="tech-icon" />
            </div>
            <p class="tech-name">ReactJS</p>
          </div>

          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/Vue.js.svg" alt="VueJS" class="tech-icon" />
            </div>
            <p class="tech-name">VueJS</p>
          </div>

          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/JavaScript.svg" alt="Javascript" class="tech-icon" />
            </div>
            <p class="tech-name">Javascript</p>
          </div>

          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/CSS3.svg" alt="CSS" class="tech-icon" />
            </div>
            <p class="tech-name">CSS</p>
          </div>

          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/HTML5.svg" alt="HTML5" class="tech-icon" />
            </div>
            <p class="tech-name">HTML5</p>
          </div>

          <div class="tech-card">
            <div class="tech-icon-wrapper">
              <img src="assest/Next.js.svg" alt="Next.js" class="tech-icon" />
            </div>
            <p class="tech-name">Next.js</p>
          </div>



        </div>
      </main>
    </div>
  </body>
</html>
